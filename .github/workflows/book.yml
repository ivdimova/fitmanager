name: Book Gym Class

on:
  schedule:
    # Sun–Thu at 10:30 CET = 09:30 UTC (23h before 9:30 AM class)
    # Books the 9:30 AM CrossFit class for the next weekday (Mon–Fri)
    # NOTE: For summer (CEST, UTC+2), change to: '30 8 * * 0-4'
    - cron: '30 9 * * 0-4'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Book class
        env:
          AIMHARDER_EMAIL: ${{ secrets.AIMHARDER_EMAIL }}
          AIMHARDER_PASSWORD: ${{ secrets.AIMHARDER_PASSWORD }}
        run: uv run python -m src.book
