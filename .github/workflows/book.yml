name: Book Gym Class

on:
  schedule:
    # Sun/Tue/Thu at 21:31 UTC = 22:31 CET (winter, UTC+1)
    # Books the 9:30 AM CrossFit class for the next day (Mon/Wed/Fri)
    # NOTE: For summer (CEST, UTC+2), change to: '31 20 * * 0,2,4'
    - cron: '31 21 * * 0,2,4'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Book class
        env:
          AIMHARDER_EMAIL: ${{ secrets.AIMHARDER_EMAIL }}
          AIMHARDER_PASSWORD: ${{ secrets.AIMHARDER_PASSWORD }}
        run: uv run python -m src.book
